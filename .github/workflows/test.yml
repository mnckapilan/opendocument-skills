name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Run ODS tests
        run: uv run --with pytest pytest ods/tests/ -v

      - name: Run ODT tests
        run: uv run --with pytest pytest odt/tests/ -v
